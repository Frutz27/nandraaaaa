
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NdraaStep | Premium Sneaker Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyber-blue: #00f2ff;
      --neon-purple: #bc13fe;
      --obsidian: #050505;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--obsidian);
      color: white;
      overflow-x: hidden;
      margin: 0;
    }
    h1, h2, h3, h4, h5, h6, .font-orbitron {
      font-family: 'Orbitron', sans-serif;
    }
    .text-glow-blue {
      text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
    }
    .bg-cyber-gradient {
      background: linear-gradient(135deg, var(--cyber-blue), var(--neon-purple));
    }
    .diagonal-cut {
      clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
    }
    .diagonal-cut-reverse {
      clip-path: polygon(0 15%, 100% 0, 100% 100%, 0% 100%);
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--cyber-blue);
    }
    .custom-cursor {
      pointer-events: none;
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
    }
  </style>
<script type="importmap">
{

    "framer-motion": "https://esm.sh/framer-motion@^12.33.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
